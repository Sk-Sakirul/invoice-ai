services:
  - type: web
    name: invoice-ai-backend
    env: python
    plan: free

    rootDir: backend

    buildCommand: bash ./render-build.sh

    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000

    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false