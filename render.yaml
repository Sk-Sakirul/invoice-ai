services:
  - type: web
    name: invoice-ai-backend
    env: python
    plan: free

    rootDir: backend

    buildCommand: |
      apt-get update
      apt-get install -y tesseract-ocr poppler-utils
      pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000

    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false